<!DOCTYPE html>
<html>
<head>
  <title>Finanças MPS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px;
    }
    .box {
      margin-top: 20px;
      padding: 10px;
      background: #1e293b;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>💰 Finanças MPS</h1>

<div id="login">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<div id="app" style="display:none;">
  <h2>Saldo: R$ <span id="saldo">0</span></h2>

  <input type="number" id="valor" placeholder="Valor">
  <button onclick="adicionar()">Adicionar</button>

  <div class="box">
    <h3>🧾 Me Devem</h3>
    <input id="nome" placeholder="Nome">
    <input id="valorDivida" placeholder="Valor">
    <button onclick="addDivida()">Adicionar</button>

    <ul id="lista"></ul>
  </div>

  <button onclick="logout()">Sair</button>
</div>

<script>
const supabase = supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user = null;
let saldo = 0;

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) return alert(error.message);

  user = data.user;
  iniciar();
}

// CADASTRO
async function signup() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) return alert(error.message);

  alert("Conta criada!");
}

// INICIAR APP
async function iniciar() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregarDividas();
}

// SALDO
function adicionar() {
  let valor = Number(document.getElementById("valor").value);
  saldo += valor;
  document.getElementById("saldo").innerText = saldo;
}

// DIVIDAS
async function addDivida() {
  const nome = document.getElementById("nome").value;
  const valor = document.getElementById("valorDivida").value;

  await supabase.from("dividas").insert([
    { user_id: user.id, nome, valor }
  ]);

  carregarDividas();
}

async function carregarDividas() {
  const { data } = await supabase
    .from("dividas")
    .select("*")
    .eq("user_id", user.id);

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(d => {
    const li = document.createElement("li");
    li.innerText = `${d.nome} - R$ ${d.valor}`;
    lista.appendChild(li);
  });
}

// LOGOUT
function logout() {
  location.reload();
}
</script>

</body>
</html>
