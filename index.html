<!DOCTYPE html>
<html>
<head>
  <title>Finanças MPS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      margin: 0;
      background: #020617;
      color: white;
      font-family: Arial;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #0f172a;
      padding: 20px;
      border-radius: 16px;
      margin-top: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #020617;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .danger {
      background: #ef4444;
    }

    .saldo {
      font-size: 28px;
      font-weight: bold;
    }

    li {
      background: #020617;
      padding: 10px;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="container">

<h1>💰 Finanças MPS</h1>

<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<div id="app" style="display:none;">

  <div class="card">
    <div class="saldo">R$ <span id="saldo">0</span></div>

    <input id="valor" placeholder="Valor">
    <button onclick="addEntrada()">Entrada</button>
    <button class="danger" onclick="addSaida()">Saída</button>
  </div>

  <div class="card">
    <h3>📊 Histórico</h3>
    <ul id="historico"></ul>
  </div>

  <div class="card">
    <h3>🧾 Me Devem</h3>
    <input id="nome">
    <input id="valorDivida">
    <button onclick="addDivida()">Adicionar</button>
    <ul id="lista"></ul>
  </div>

  <button onclick="logout()">Sair</button>

</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user = null;

// LOGIN
async function login() {
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });

  if (error) {
    alert(error.message);
    return;
  }

  user = data.user;
  iniciar();
}

// CADASTRO
async function signup() {
  const { error } = await supabaseClient.auth.signUp({
    email: email.value,
    password: senha.value
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Conta criada! Agora clique em ENTRAR");
}

// INICIAR
async function iniciar() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregarSaldo();
  carregarHistorico();
  carregarDividas();
}

// SALDO
async function carregarSaldo() {
  const { data } = await supabaseClient
    .from("transacoes")
    .select("*")
    .eq("user_id", user.id);

  let total = 0;

  data.forEach(t => {
    total += t.tipo === "entrada" ? t.valor : -t.valor;
  });

  saldo.innerText = total;
}

// ENTRADA
async function addEntrada() {
  await supabaseClient.from("transacoes").insert([
    { user_id: user.id, valor: Number(valor.value), tipo: "entrada" }
  ]);
  atualizar();
}

// SAÍDA
async function addSaida() {
  await supabaseClient.from("transacoes").insert([
    { user_id: user.id, valor: Number(valor.value), tipo: "saida" }
  ]);
  atualizar();
}

// HISTÓRICO
async function carregarHistorico() {
  const { data } = await supabaseClient
    .from("transacoes")
    .select("*")
    .eq("user_id", user.id);

  historico.innerHTML = "";

  data.forEach(t => {
    const li = document.createElement("li");
    li.innerText = `${t.tipo} - R$ ${t.valor}`;
    historico.appendChild(li);
  });
}

// DIVIDAS
async function addDivida() {
  await supabaseClient.from("dividas").insert([
    { user_id: user.id, nome: nome.value, valor: valorDivida.value }
  ]);
  carregarDividas();
}

async function carregarDividas() {
  const { data } = await supabaseClient
    .from("dividas")
    .select("*")
    .eq("user_id", user.id);

  lista.innerHTML = "";

  data.forEach(d => {
    const li = document.createElement("li");
    li.innerText = `${d.nome} - R$ ${d.valor}`;
    lista.appendChild(li);
  });
}

// ATUALIZAR
function atualizar() {
  carregarSaldo();
  carregarHistorico();
}

// LOGOUT
function logout() {
  location.reload();
}
</script>

</body>
</html>
