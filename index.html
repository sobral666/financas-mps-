<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
  url("./fundo.jpg");
  background-size: cover;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}

.saida {
  background: #ef4444;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  background: rgba(0,0,0,0.6);
  padding: 10px;
  margin-top: 5px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🏗️ Finanças MPS</h1>

<!-- LOGIN -->
<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
  <h2>💰 Saldo: R$ <span id="saldo">0</span></h2>

  <input id="valor" placeholder="Valor">
  <input id="descricao" placeholder="Descrição (ex: lanche)">

  <button onclick="addEntrada()">Entrada</button>
  <button class="saida" onclick="addSaida()">Saída</button>
</div>

<div class="card">
  <h3>📊 Histórico</h3>
  <ul id="historico"></ul>
</div>

<div class="card">
  <h3>🧾 Dívidas</h3>

  <input id="nome" placeholder="Nome">
  <input id="valorDivida" placeholder="Valor">
  <input id="parcelas" placeholder="Parcelas">

  <button onclick="addDivida()">Adicionar</button>

  <ul id="lista"></ul>
</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user = null;

// 🔥 LOGIN (FORÇANDO ENTRADA)
window.login = async function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    alert(error.message);
    return;
  }

  user = data.user;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregarTudo();
}

// 🔥 CADASTRO (FORÇA ENTRAR)
window.signup = async function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Conta criada!");

  user = data.user;

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregarTudo();
}

// CATEGORIA
function categoria(desc) {
  desc = desc.toLowerCase();

  if (desc.includes("lanche") || desc.includes("comida")) return "🍔 Alimentação";
  if (desc.includes("uber") || desc.includes("gasolina")) return "🚗 Transporte";
  if (desc.includes("salario")) return "💰 Receita";

  return "📦 Outros";
}

// TRANSAÇÕES
async function addEntrada() {
  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(valor.value),
    tipo: "entrada",
    categoria: categoria(descricao.value),
    descricao: descricao.value
  }]);

  carregarTudo();
}

async function addSaida() {
  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(valor.value),
    tipo: "saida",
    categoria: categoria(descricao.value),
    descricao: descricao.value
  }]);

  carregarTudo();
}

async function carregarTudo() {
  carregarTransacoes();
  carregarDividas();
}

async function carregarTransacoes() {
  const { data } = await supabase
    .from("transacoes")
    .select("*")
    .eq("user_id", user.id);

  let saldo = 0;
  historico.innerHTML = "";

  data.forEach(t => {
    if (t.tipo === "entrada") saldo += t.valor;
    else saldo -= t.valor;

    const li = document.createElement("li");
    li.innerHTML = `
      <b>${t.tipo === "entrada" ? "+" : "-"} R$ ${t.valor}</b><br>
      ${t.descricao}<br>
      ${t.categoria}
    `;
    historico.appendChild(li);
  });

  document.getElementById("saldo").innerText = saldo;
}

// DIVIDAS
async function addDivida() {
  await supabase.from("dividas").insert([{
    user_id: user.id,
    nome: nome.value,
    valor: valorDivida.value,
    parcelas: parcelas.value,
    parcelas_pagas: 0
  }]);

  carregarDividas();
}

async function pagarParcela(id, pagas) {
  await supabase
    .from("dividas")
    .update({ parcelas_pagas: pagas + 1 })
    .eq("id", id);

  carregarDividas();
}

async function carregarDividas() {
  const { data } = await supabase
    .from("dividas")
    .select("*")
    .eq("user_id", user.id);

  lista.innerHTML = "";

  data.forEach(d => {
    const li = document.createElement("li");

    li.innerHTML = `
      <b>${d.nome}</b><br>
      R$ ${d.valor}<br>
      ${d.parcelas_pagas}/${d.parcelas}
      <button onclick="pagarParcela('${d.id}', ${d.parcelas_pagas})">
        Pagar
      </button>
    `;

    lista.appendChild(li);
  });
}

// LOGOUT
window.logout = async function() {
  await supabase.auth.signOut();
  location.reload();
}

</script>

</body>
</html>
