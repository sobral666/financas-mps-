<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  background: #111;
}

.container {
  max-width: 500px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Finanças MPS</h2>

<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="signup()">Criar conta</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" class="card" style="display:none;">
  <h3>✅ LOGADO COM SUCESSO</h3>
  <button onclick="logout()">Sair</button>
</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

// MOSTRAR APP
function mostrarApp() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// CADASTRO
async function signup() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) return alert(error.message);

  alert("Conta criada!");
}

// LOGIN (CORRIGIDO)
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  console.log(data, error);

  if (error) {
    alert(error.message);
    return;
  }

  if (!data.session) {
    alert("Login falhou");
    return;
  }

  mostrarApp();
}

// AUTO LOGIN (CHAVE DO PROBLEMA)
async function verificar() {
  const { data } = await supabase.auth.getSession();

  if (data.session) {
    mostrarApp();
  }
}

verificar();

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

</script>

</body>
</html>
