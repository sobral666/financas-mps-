<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
}

.saida { background: #ef4444; }

.topo {
  font-size: 28px;
  font-weight: bold;
}

.linha {
  display: flex;
  justify-content: space-between;
}

.item {
  background: #020617;
  padding: 10px;
  border-radius: 10px;
  margin-top: 5px;
}

.progresso {
  height: 6px;
  background: #22c55e;
  border-radius: 10px;
}

.barra {
  background: #000;
  height: 6px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Finanças MPS</h1>

<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<div id="app" style="display:none;">

<div class="card">
  <div class="topo">R$ <span id="saldo">0</span></div>
  <div class="linha">
    <span>Entrada: <b id="entrada">0</b></span>
    <span>Saída: <b id="saida">0</b></span>
  </div>

  <input id="valor" placeholder="Valor">
  <input id="descricao" placeholder="Descrição">

  <button onclick="addEntrada()">Entrada</button>
  <button class="saida" onclick="addSaida()">Saída</button>
</div>

<div class="card">
  <h3>📊 Histórico</h3>
  <div id="historico"></div>
</div>

<div class="card">
  <h3>🧾 Dívidas</h3>

  <input id="nome" placeholder="Nome">
  <input id="valorDivida" placeholder="Valor">
  <input id="parcelas" placeholder="Parcelas">

  <button onclick="addDivida()">Adicionar</button>

  <div id="lista"></div>
</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user;

// LOGIN AUTOMÁTICO
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    user = session.user;
    loginDiv.style.display = "none";
    app.style.display = "block";
    carregarTudo();
  }
});

const loginDiv = document.getElementById("login");
const app = document.getElementById("app");

// LOGIN
window.login = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });

  if (error) alert(error.message);
};

// CADASTRO
window.signup = async () => {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: senha.value
  });

  if (error) alert(error.message);
};

// CATEGORIA
function cat(d) {
  d = d.toLowerCase();
  if (d.includes("lanche")) return "🍔";
  if (d.includes("uber")) return "🚗";
  return "💰";
}

// TRANSAÇÕES
async function addEntrada() {
  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(valor.value),
    tipo: "entrada",
    categoria: cat(descricao.value),
    descricao: descricao.value
  }]);
  carregarTudo();
}

async function addSaida() {
  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(valor.value),
    tipo: "saida",
    categoria: cat(descricao.value),
    descricao: descricao.value
  }]);
  carregarTudo();
}

// CARREGAR
async function carregarTudo() {
  carregarTransacoes();
  carregarDividas();
}

async function carregarTransacoes() {
  const { data } = await supabase.from("transacoes")
  .select("*").eq("user_id", user.id);

  let saldo = 0, ent = 0, sai = 0;
  historico.innerHTML = "";

  data.forEach(t => {
    if (t.tipo === "entrada") {
      saldo += t.valor; ent += t.valor;
    } else {
      saldo -= t.valor; sai += t.valor;
    }

    historico.innerHTML += `
      <div class="item">
        ${t.categoria} ${t.descricao}<br>
        R$ ${t.valor}
        <button onclick="delTrans('${t.id}')">❌</button>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo;
  document.getElementById("entrada").innerText = ent;
  document.getElementById("saida").innerText = sai;
}

window.delTrans = async (id) => {
  await supabase.from("transacoes").delete().eq("id", id);
  carregarTudo();
};

// DIVIDAS
async function addDivida() {
  await supabase.from("dividas").insert([{
    user_id: user.id,
    nome: nome.value,
    valor: valorDivida.value,
    parcelas: parcelas.value,
    parcelas_pagas: 0
  }]);
  carregarDividas();
}

async function pagar(id, p) {
  await supabase.from("dividas")
  .update({ parcelas_pagas: p + 1 }).eq("id", id);
  carregarDividas();
}

async function carregarDividas() {
  const { data } = await supabase.from("dividas")
  .select("*").eq("user_id", user.id);

  lista.innerHTML = "";

  data.forEach(d => {
    let prog = (d.parcelas_pagas/d.parcelas)*100;

    lista.innerHTML += `
      <div class="item">
        ${d.nome}<br>
        ${d.parcelas_pagas}/${d.parcelas}
        <div class="barra">
          <div class="progresso" style="width:${prog}%"></div>
        </div>
        <button onclick="pagar('${d.id}', ${d.parcelas_pagas})">Pagar</button>
      </div>
    `;
  });
}

window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

</script>

</body>
</html>
