<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<style>
body {
  background:#0f172a;
  color:white;
  font-family:Arial;
  margin:0;
  padding:20px;
}

.container {
  max-width:900px;
  margin:auto;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

input,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button { background:#22c55e; color:white; }
.saida { background:#ef4444; }

.item {
  background:#020617;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Finanças MPS</h1>

<!-- LOGIN -->
<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
  <h2>Saldo: R$ <span id="saldo">0</span></h2>

  <input id="valor" placeholder="Valor">
  <input id="descricao" placeholder="Descrição">

  <button onclick="entrada()">Entrada</button>
  <button class="saida" onclick="saida()">Saída</button>
</div>

<div class="card">
  <h3>📊 Histórico</h3>
  <div id="historico"></div>
</div>

<div class="card">
  <h3>🧾 Dívidas</h3>

  <input id="nome" placeholder="Nome">
  <input id="valorDivida" placeholder="Valor">
  <input id="parcelas" placeholder="Parcelas">

  <button onclick="addDivida()">Adicionar</button>

  <div id="dividas"></div>
</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user;

// 🔥 LOGIN AUTOMÁTICO (BASE DO APP)
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    user = session.user;
    login.style.display = "none";
    app.style.display = "block";
    carregar();
  }
});

// LOGIN
window.login = async () => {
  const { error } = await supabase.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });

  if (error) alert(error.message);
};

// CADASTRO
window.signup = async () => {
  const { error } = await supabase.auth.signUp({
    email: email.value,
    password: senha.value
  });

  if (error) alert(error.message);
};

// TRANSAÇÕES
window.entrada = async () => {
  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(valor.value),
    tipo: "entrada",
    descricao: descricao.value
  }]);
  carregar();
};

window.saida = async () => {
  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(valor.value),
    tipo: "saida",
    descricao: descricao.value
  }]);
  carregar();
};

// CARREGAR DADOS
async function carregar() {
  carregarTransacoes();
  carregarDividas();
}

async function carregarTransacoes() {
  const { data } = await supabase.from("transacoes")
  .select("*").eq("user_id", user.id);

  let saldo = 0;
  historico.innerHTML = "";

  data.forEach(t => {
    if (t.tipo === "entrada") saldo += t.valor;
    else saldo -= t.valor;

    historico.innerHTML += `
      <div class="item">
        ${t.tipo === "entrada" ? "+" : "-"} R$ ${t.valor}<br>
        ${t.descricao}
        <button onclick="del('${t.id}')">Excluir</button>
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo;
}

// DELETE
window.del = async (id) => {
  await supabase.from("transacoes").delete().eq("id", id);
  carregar();
};

// DIVIDAS
window.addDivida = async () => {
  await supabase.from("dividas").insert([{
    user_id: user.id,
    nome: nome.value,
    valor: valorDivida.value,
    parcelas: parcelas.value,
    parcelas_pagas: 0
  }]);
  carregarDividas();
};

async function carregarDividas() {
  const { data } = await supabase.from("dividas")
  .select("*").eq("user_id", user.id);

  dividas.innerHTML = "";

  data.forEach(d => {
    let prog = (d.parcelas_pagas/d.parcelas)*100;

    dividas.innerHTML += `
      <div class="item">
        ${d.nome}<br>
        ${d.parcelas_pagas}/${d.parcelas}
        <div style="background:#000;height:5px">
          <div style="width:${prog}%;background:#22c55e;height:5px"></div>
        </div>
        <button onclick="pagar('${d.id}', ${d.parcelas_pagas})">Pagar</button>
      </div>
    `;
  });
}

window.pagar = async (id, p) => {
  await supabase.from("dividas")
  .update({ parcelas_pagas: p + 1 }).eq("id", id);
  carregarDividas();
};

// LOGOUT
window.logout = async () => {
  await supabase.auth.signOut();
  location.reload();
};

</script>

</body>
</html>
