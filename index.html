<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;

  background: linear-gradient(
    rgba(0,0,0,0.75),
    rgba(0,0,0,0.9)
  ),
  url("fundo.jpg");

  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  font-size: 32px;
}

.card {
  background: rgba(10,10,10,0.85);
  backdrop-filter: blur(12px);
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 30px rgba(0,0,0,0.8);
}

input, button, select {
  padding: 12px;
  margin: 5px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
}

input {
  width: 90%;
}

button {
  background: #22c55e;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

.btn-danger {
  background: #ef4444;
}

.btn-danger:hover {
  background: #dc2626;
}

.flex {
  display: flex;
  flex-wrap: wrap;
}

.item {
  margin: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🏗️ Finanças MPS</h1>
<p style="opacity:0.7;">Controle financeiro de obras e investimentos</p>

<!-- LOGIN -->
<div id="login" class="card">
  <h3>Login</h3>
  <input id="email" placeholder="Email"><br>
  <input id="senha" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<div class="card">
  <h2>💰 Saldo: R$ <span id="saldo">0</span></h2>

  <input id="valor" type="number" placeholder="Valor">
  <select id="tipo">
    <option value="entrada">Entrada (salário)</option>
    <option value="saida">Saída (lanche)</option>
  </select>

  <select id="categoria">
    <option>Salário</option>
    <option>Comida</option>
    <option>Transporte</option>
    <option>Material</option>
  </select>

  <button onclick="addTransacao()">Adicionar</button>
</div>

<div class="card">
  <h3>📊 Histórico</h3>
  <ul id="transacoes"></ul>
</div>

<div class="card">
  <h3>🧾 Devedores</h3>

  <input id="nome" placeholder="Nome">
  <input id="valorDivida" placeholder="Valor total">
  <input id="parcelas" placeholder="Parcelas">

  <button onclick="addDivida()">Adicionar</button>

  <ul id="lista"></ul>
</div>

<button class="btn-danger" onclick="logout()">Sair</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user = null;

// LOGIN
async function login() {
  const email = emailInput();
  const senha = senhaInput();

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) return alert(error.message);

  user = data.user;
  iniciar();
}

// CADASTRO
async function signup() {
  const email = emailInput();
  const senha = senhaInput();

  const { error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) return alert(error.message);

  alert("Conta criada! Agora entra 👍");
}

// INICIAR
async function iniciar() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  carregarTransacoes();
  carregarDividas();
}

// TRANSACOES
async function addTransacao() {
  const valor = Number(document.getElementById("valor").value);
  const tipo = document.getElementById("tipo").value;
  const categoria = document.getElementById("categoria").value;

  await supabase.from("transacoes").insert([
    { user_id: user.id, valor, tipo, categoria }
  ]);

  carregarTransacoes();
}

async function carregarTransacoes() {
  const { data } = await supabase
    .from("transacoes")
    .select("*")
    .eq("user_id", user.id);

  let saldo = 0;
  const lista = document.getElementById("transacoes");
  lista.innerHTML = "";

  data.forEach(t => {
    if (t.tipo === "entrada") saldo += t.valor;
    else saldo -= t.valor;

    const li = document.createElement("li");
    li.innerText = `${t.tipo} - ${t.categoria} - R$ ${t.valor}`;
    lista.appendChild(li);
  });

  document.getElementById("saldo").innerText = saldo;
}

// DIVIDAS
async function addDivida() {
  const nome = document.getElementById("nome").value;
  const valor = document.getElementById("valorDivida").value;
  const parcelas = document.getElementById("parcelas").value;

  await supabase.from("dividas").insert([
    {
      user_id: user.id,
      nome,
      valor,
      parcelas,
      parcelas_pagas: 0
    }
  ]);

  carregarDividas();
}

async function pagarParcela(id, pagas) {
  await supabase
    .from("dividas")
    .update({ parcelas_pagas: pagas + 1 })
    .eq("id", id);

  carregarDividas();
}

async function carregarDividas() {
  const { data } = await supabase
    .from("dividas")
    .select("*")
    .eq("user_id", user.id);

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(d => {
    const li = document.createElement("li");

    li.innerHTML = `
      ${d.nome} - R$ ${d.valor}
      (${d.parcelas_pagas}/${d.parcelas})
      <button onclick="pagarParcela('${d.id}', ${d.parcelas_pagas})">
        Pagar
      </button>
    `;

    lista.appendChild(li);
  });
}

// HELPERS
function emailInput() {
  return document.getElementById("email").value;
}

function senhaInput() {
  return document.getElementById("senha").value;
}

// LOGOUT
function logout() {
  location.reload();
}

</script>

</body>
</html>
