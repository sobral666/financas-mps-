<!DOCTYPE html>
<html>
<head>
  <title>Finanças MPS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;

      background: url("https://images.unsplash.com/photo-1621416894569-0f39ed31d247") no-repeat center center fixed;
      background-size: cover;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(15px);
      padding: 20px;
      border-radius: 16px;
      margin-top: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
    }

    .saida {
      background: #ef4444;
    }

    .saldo {
      font-size: 34px;
      font-weight: bold;
    }

    .resumo {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }

    .barra {
      height: 8px;
      background: #000;
      border-radius: 10px;
      margin-top: 5px;
    }

    .progresso {
      height: 8px;
      background: #22c55e;
      border-radius: 10px;
    }

    li {
      background: rgba(0,0,0,0.6);
      padding: 10px;
      border-radius: 10px;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" style="display:flex; height:100vh; align-items:center; justify-content:center;">

  <div style="
    width: 90%;
    max-width: 400px;
    padding: 30px;
    border-radius: 20px;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(15px);
    text-align: center;
  ">

    <h2>💰 Finanças MPS</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>
    <button onclick="signup()" style="background:#334155;">
      Criar conta
    </button>

  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="container">

  <h1>💰 Finanças MPS</h1>

  <div class="card">
    <div class="saldo">R$ <span id="saldo">0</span></div>

    <div class="resumo">
      <span>Entrada: R$ <span id="entrada">0</span></span>
      <span>Saída: R$ <span id="saida">0</span></span>
    </div>

    <input id="valor" placeholder="Valor">
    <input id="descricao" placeholder="Descrição">

    <button onclick="addEntrada()">Entrada</button>
    <button class="saida" onclick="addSaida()">Saída</button>
  </div>

  <div class="card">
    <h3>📊 Gastos</h3>
    <canvas id="grafico"></canvas>
  </div>

  <div class="card">
    <h3>🧾 Dívidas</h3>

    <input id="nome" placeholder="Nome">
    <input id="valorDivida" placeholder="Valor total">
    <input id="parcelas" placeholder="Parcelas">

    <button onclick="addDivida()">Adicionar</button>

    <ul id="lista"></ul>
  </div>

  <button onclick="logout()">Sair</button>

</div>

<script>
const supabaseClient = supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user = null;
let chart;

// LOGIN
async function login() {
  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email: email.value,
    password: senha.value
  });

  if (error) return alert(error.message);

  user = data.user;
  iniciar();
}

// CADASTRO
async function signup() {
  const { error } = await supabaseClient.auth.signUp({
    email: email.value,
    password: senha.value
  });

  if (error) return alert(error.message);

  alert("Conta criada!");
}

// INICIAR
async function iniciar() {
  login.style.display = "none";
  app.style.display = "block";
  carregarTudo();
}

// CATEGORIA
function categoria(desc) {
  desc = desc.toLowerCase();

  if (desc.includes("lanche") || desc.includes("comida")) return "Alimentação";
  if (desc.includes("uber") || desc.includes("gasolina")) return "Transporte";
  if (desc.includes("salario")) return "Receita";

  return "Outros";
}

// CARREGAR
async function carregarTudo() {
  const { data } = await supabaseClient
    .from("transacoes")
    .select("*")
    .eq("user_id", user.id);

  let total = 0, ent = 0, sai = 0;
  let categorias = {};

  data.forEach(t => {
    if (t.tipo === "entrada") {
      total += t.valor;
      ent += t.valor;
    } else {
      total -= t.valor;
      sai += t.valor;
      categorias[t.categoria] = (categorias[t.categoria] || 0) + t.valor;
    }
  });

  saldo.innerText = total;
  entrada.innerText = ent;
  saida.innerText = sai;

  desenharGrafico(categorias);
  carregarDividas();
}

// GRÁFICO
function desenharGrafico(dados) {
  if (chart) chart.destroy();

  chart = new Chart(grafico, {
    type: 'doughnut',
    data: {
      labels: Object.keys(dados),
      datasets: [{ data: Object.values(dados) }]
    }
  });
}

// ENTRADA
async function addEntrada() {
  await supabaseClient.from("transacoes").insert([{
    user_id: user.id,
    tipo: "entrada",
    valor: Number(valor.value),
    descricao: descricao.value,
    categoria: categoria(descricao.value)
  }]);

  carregarTudo();
}

// SAÍDA
async function addSaida() {
  await supabaseClient.from("transacoes").insert([{
    user_id: user.id,
    tipo: "saida",
    valor: Number(valor.value),
    descricao: descricao.value,
    categoria: categoria(descricao.value)
  }]);

  carregarTudo();
}

// DIVIDAS
async function addDivida() {
  await supabaseClient.from("dividas").insert([{
    user_id: user.id,
    nome: nome.value,
    valor_total: valorDivida.value,
    parcelas_total: parcelas.value
  }]);

  carregarDividas();
}

async function pagarParcela(id, pagas) {
  await supabaseClient
    .from("dividas")
    .update({ parcelas_pagas: pagas + 1 })
    .eq("id", id);

  carregarDividas();
}

async function carregarDividas() {
  const { data } = await supabaseClient
    .from("dividas")
    .select("*")
    .eq("user_id", user.id);

  lista.innerHTML = "";

  data.forEach(d => {
    const progresso = (d.parcelas_pagas / d.parcelas_total) * 100;

    const li = document.createElement("li");
    li.innerHTML = `
      <b>${d.nome}</b><br>
      R$ ${d.valor_total}<br>
      ${d.parcelas_pagas}/${d.parcelas_total}

      <div class="barra">
        <div class="progresso" style="width:${progresso}%"></div>
      </div>

      <button onclick="pagarParcela('${d.id}', ${d.parcelas_pagas})">
        Pagar parcela
      </button>
    `;

    lista.appendChild(li);
  });
}

// LOGOUT
function logout() {
  location.reload();
}
</script>

</body>
</html>
