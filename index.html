<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;

  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)),
  url("./fundo.jpg");

  background-size: cover;
  background-position: center;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.card {
  background: rgba(0,0,0,0.6);
  padding: 20px;
  border-radius: 16px;
  margin-top: 15px;
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}

button {
  background: #22c55e;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🏗️ Finanças MPS</h1>

<!-- LOGIN -->
<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
  <button onclick="signup()">Criar conta</button>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="card">
  <h2>🎉 LOGADO COM SUCESSO</h2>
  <p>Agora seu app está funcionando</p>
  <button onclick="logout()">Sair</button>
</div>

</div>

<script>

const supabaseClient = window.supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

// FUNÇÃO ENTRAR (FORÇADA)
function entrar() {
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabaseClient.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Login OK");
  entrar();
}

// CADASTRO
async function signup() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { data, error } = await supabaseClient.auth.signUp({
    email,
    password: senha
  });

  if (error) {
    alert(error.message);
    return;
  }

  alert("Conta criada e já logada!");
  entrar();
}

// AUTO LOGIN (IMPORTANTÍSSIMO)
async function verificarSessao() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session) {
    entrar();
  }
}

verificarSessao();

// LOGOUT
async function logout() {
  await supabaseClient.auth.signOut();
  location.reload();
}

</script>

</body>
</html>
