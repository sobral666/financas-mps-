<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Finanças MPS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin-top:15px;
}

input,button {
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

button { background:#22c55e; color:white; }
.saida { background:#ef4444; }

.item {
  background:#020617;
  padding:10px;
  margin-top:5px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>💰 Finanças MPS</h1>

<div id="login" class="card">
  <input id="email" placeholder="Email">
  <input id="senha" type="password" placeholder="Senha">
  <button onclick="signup()">Criar conta</button>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;">

<div class="card">
  <h2>Saldo: R$ <span id="saldo">0</span></h2>

  <input id="valor" placeholder="Valor">
  <input id="descricao" placeholder="Descrição">

  <button onclick="addEntrada()">Entrada</button>
  <button class="saida" onclick="addSaida()">Saída</button>
</div>

<div class="card">
  <h3>📊 Histórico</h3>
  <div id="historico"></div>
</div>

<button onclick="logout()">Sair</button>

</div>

</div>

<script>

const supabase = window.supabase.createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

let user = null;

// LOGIN AUTOMÁTICO
supabase.auth.onAuthStateChange((event, session) => {
  if (session) {
    user = session.user;
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    carregar();
  } else {
    document.getElementById("login").style.display = "block";
    document.getElementById("app").style.display = "none";
  }
});

// CADASTRO
async function signup() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) return alert(error.message);

  await login();
}

// LOGIN
async function login() {
  const { error } = await supabase.auth.signInWithPassword({
    email: document.getElementById("email").value,
    password: document.getElementById("senha").value
  });

  if (error) alert(error.message);
}

// ENTRADA
async function addEntrada() {
  if (!user) return alert("Faça login");

  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(document.getElementById("valor").value),
    tipo: "entrada",
    descricao: document.getElementById("descricao").value
  }]);

  carregar();
}

// SAÍDA
async function addSaida() {
  if (!user) return alert("Faça login");

  await supabase.from("transacoes").insert([{
    user_id: user.id,
    valor: Number(document.getElementById("valor").value),
    tipo: "saida",
    descricao: document.getElementById("descricao").value
  }]);

  carregar();
}

// CARREGAR
async function carregar() {
  const { data } = await supabase
    .from("transacoes")
    .select("*")
    .eq("user_id", user.id);

  let saldo = 0;
  historico.innerHTML = "";

  data.forEach(t => {
    if (t.tipo === "entrada") saldo += t.valor;
    else saldo -= t.valor;

    historico.innerHTML += `
      <div class="item">
        ${t.tipo === "entrada" ? "+" : "-"} R$ ${t.valor}<br>
        ${t.descricao}
      </div>
    `;
  });

  document.getElementById("saldo").innerText = saldo;
}

// LOGOUT
async function logout() {
  await supabase.auth.signOut();
}

</script>

</body>
</html>
