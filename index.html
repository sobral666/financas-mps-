<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TESTE FINAL</title>
</head>

<body style="background:#111;color:white;padding:20px;">

<h2>TESTE SUPABASE</h2>

<input id="email" placeholder="Email"><br><br>
<input id="senha" type="password" placeholder="Senha"><br><br>

<button onclick="criar()">Criar conta</button>
<button onclick="entrar()">Entrar</button>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://hhbgoratecpjfhohowoe.supabase.co",
  "sb_publishable_9KRPr2qXdr6IzMTCADA2CA_TgQBOuF5"
);

alert("Supabase carregado");

supabase.auth.onAuthStateChange((event, session) => {
  console.log(event, session);

  if (session) {
    alert("LOGADO!!!");
  }
});

window.criar = async function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signUp({
    email,
    password: senha
  });

  if (error) alert(error.message);
}

window.entrar = async function() {
  const email = document.getElementById("email").value;
  const senha = document.getElementById("senha").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: senha
  });

  if (error) alert(error.message);
}

</script>

</body>
</html>
